[phases.setup]
aptPkgs = [
  # Core Chromium runtime
  "libglib2.0-0",
  "libnspr4",          # ← was missing; caused "libnspr4.so: cannot open shared object file"
  "libnss3",
  "libdbus-1-3",
  "libexpat1",
  # Rendering / graphics
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxcursor1",
  "libxdamage1",
  "libxfixes3",
  "libxi6",
  "libxrandr2",
  "libxrender1",
  "libxss1",
  "libxtst6",
  "libx11-6",
  "libx11-xcb1",
  "libxcb1",
  "libxext6",
  "libgbm1",
  # Font / text
  "libfontconfig1",
  "libpango-1.0-0",
  "libcairo2",
  "fonts-liberation",
  # Audio (Chromium links against it even in headless mode)
  "libasound2"
]
