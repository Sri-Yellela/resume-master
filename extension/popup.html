<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px; padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F7F6F2; color: #28251D;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .header-title { font-size: 15px; font-weight: 600; color: #28251D; }
    .btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 9px 14px; margin-bottom: 8px;
      border-radius: 10px; border: none; font-size: 13px;
      font-weight: 500; cursor: pointer;
      transition: background 0.15s ease;
      font-family: inherit; text-align: left;
    }
    .btn-primary { background: #01696F; color: #fff; }
    .btn-primary:hover { background: #0C4E54; }
    .btn-secondary { background: #F3F0EC; color: #28251D; border: 1px solid #D4D1CA; }
    .btn-secondary:hover { background: #E6E4DF; }
    .status { font-size: 11px; color: #7A7974; margin-top: 6px; text-align: center; min-height: 14px; }
    .divider { border: none; border-top: 1px solid #DCD9D5; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <rect x="4" y="2" width="16" height="20" rx="2" stroke="#01696F" stroke-width="1.5"/>
      <path d="M8 7h8M8 11h8M8 15h5" stroke="#01696F" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="header-title">Resume Master</span>
  </div>

  <button class="btn btn-primary" id="btn-resume">Open Resume Builder</button>
  <button class="btn btn-secondary" id="btn-linkedin">Import from LinkedIn</button>
  <hr class="divider">
  <button class="btn btn-secondary" id="btn-ats">ATS Score Tool</button>

  <p class="status" id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
