<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{width:300px;background:#0f172a;color:#f8fafc;font-family:Arial,sans-serif;font-size:12px;}
    .header{background:#0a0f1a;padding:12px 14px;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:8px;}
    .logo{font-weight:900;color:#38bdf8;font-size:15px;}
    .mode{background:#1e293b;color:#38bdf8;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:auto;}
    .body{padding:14px;display:flex;flex-direction:column;gap:10px;}
    button{border:none;border-radius:6px;padding:9px;cursor:pointer;font-weight:700;font-size:12px;width:100%;transition:opacity .15s;}
    button:disabled{opacity:.5;cursor:not-allowed;}
    .btn-fill{background:#3b82f6;color:#fff;}
    .btn-fill:hover:not(:disabled){background:#2563eb;}
    .btn-sec{background:#1e293b;color:#94a3b8;}
    .btn-sec:hover:not(:disabled){background:#334155;}
    .status{font-size:11px;color:#64748b;text-align:center;min-height:16px;padding:2px 0;}
    .status.ok{color:#86efac;}.status.err{color:#fca5a5;}.status.loading{color:#fbbf24;}
    hr{border:none;border-top:1px solid #1e293b;}
    .label{font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block;}
    input[type=text],input[type=password]{width:100%;padding:6px 8px;border-radius:5px;border:1px solid #334155;background:#0a0f1a;color:#f8fafc;font-size:11px;outline:none;box-sizing:border-box;}
    .row{display:flex;gap:6px;align-items:flex-end;}
    .row input{flex:1;}
    .row button{width:auto;padding:6px 12px;font-size:11px;}
    .hint{font-size:10px;color:#475569;line-height:1.5;}
    a{color:#38bdf8;text-decoration:none;}
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⚡</span>
    <span style="font-weight:700;font-size:13px;">Resume Master</span>
    <span class="mode" id="modeBadge">—</span>
  </div>
  <div class="body">
    <button class="btn-fill" id="btnFill">⚡ Autofill This Page</button>
    <div class="status" id="status">Ready</div>
    <hr/>
    <div>
      <span class="label">Resume Master URL</span>
      <div class="row">
        <input type="text" id="apiUrl" placeholder="http://localhost:3001"/>
        <button class="btn-sec" id="btnSave" style="width:auto">Save</button>
      </div>
    </div>
    <div class="hint">
      Make sure you are logged into Resume Master in Chrome before autofilling.<br/>
      Get an Apify token at <a href="https://console.apify.com" target="_blank">console.apify.com</a>.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
