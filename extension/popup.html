<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Resume Master Importer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 340px;
        margin: 0;
        padding: 16px;
        background: #f8fafc;
        color: #111827;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin: 10px 0 4px;
      }
      input, textarea, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 6px;
      }
      input, textarea {
        border: 1px solid #cbd5e1;
        padding: 8px 10px;
        background: #fff;
        font-size: 12px;
      }
      textarea {
        min-height: 74px;
        resize: vertical;
      }
      button {
        margin-top: 12px;
        border: none;
        background: #0a66c2;
        color: #fff;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .muted {
        font-size: 11px;
        color: #475569;
        line-height: 1.5;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>LinkedIn Saved Jobs Import</h1>
    <div class="muted">Open your LinkedIn saved-jobs page, paste the short-lived import token from Resume Master, then run import.</div>

    <label for="baseUrl">Resume Master URL</label>
    <input id="baseUrl" value="http://localhost:3001" />

    <label for="token">Import token</label>
    <textarea id="token" placeholder="Paste the token from Resume Master"></textarea>

    <button id="importBtn">Import LinkedIn Saved Jobs</button>
    <div id="status" class="status"></div>

    <script src="popup.js"></script>
  </body>
  </html>
