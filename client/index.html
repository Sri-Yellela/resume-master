<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Master</title>

    <!-- Google Fonts: Barlow Condensed (Lucy tin brand) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet"/>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #ffffff; }
      @keyframes spin        { to { transform: rotate(360deg); } }
      @keyframes shimmer     { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
      @keyframes fadeSlideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
      @keyframes scrollUp    { 0%{transform:translateY(0)} 100%{transform:translateY(-50%)} }
      @keyframes pulseGlow   { 0%,100%{opacity:1} 50%{opacity:0.6} }
      @keyframes zoomIn      { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }

      /* Lucy brand: Barlow Condensed ExtraBold site title */
      .site-title {
        font-family: 'Barlow Condensed', 'DM Sans', system-ui, sans-serif;
        font-weight: 800;
        font-size: 28px;
        color: #0f0f0f;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
