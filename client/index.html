<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Master</title>

    <!-- Dancing Script — free vintage flowing script, similar to Sacrifice -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet"/>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0f172a; }
      @keyframes spin        { to { transform: rotate(360deg); } }
      @keyframes shimmer     { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
      @keyframes fadeSlideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
      @keyframes scrollUp    { 0%{transform:translateY(0)} 100%{transform:translateY(-50%)} }
      @keyframes pulseGlow   { 0%,100%{opacity:1} 50%{opacity:0.6} }
      @keyframes zoomIn      { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }

      /* Post-login bar (dark bg) — pink glow */
      .site-title {
        font-family: 'Dancing Script', cursive;
        font-weight: 700;
        font-size: 24px;
        color: #e879f9;
        text-shadow:
          0 0 6px  rgba(232, 121, 249, 0.95),
          0 0 14px rgba(232, 121, 249, 0.65),
          0 0 28px rgba(232, 121, 249, 0.38),
          0 0 55px rgba(232, 121, 249, 0.18);
        letter-spacing: 0.5px;
      }
      /* Landing page nav (light bg) — darker pink, same glow */
      .site-title-light {
        font-family: 'Dancing Script', cursive;
        font-weight: 700;
        font-size: 22px;
        color: #c026d3;
        text-shadow:
          0 0 5px  rgba(192, 38, 211, 0.7),
          0 0 12px rgba(192, 38, 211, 0.4),
          0 0 24px rgba(192, 38, 211, 0.2);
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
